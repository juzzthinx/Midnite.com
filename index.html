<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MIDNITE — J.Nazreen / F12</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas#c { display:block; width:100vw; height:100vh; }

/* LOADING */
#loading {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.4rem; z-index:200; transition:opacity 1.4s ease;
}
#loading .pre  { color:#333; font-size:0.52rem; letter-spacing:0.7em; text-transform:uppercase; }
#loading h1    { color:#e8d48a; font-size:clamp(3rem,12vw,7rem); letter-spacing:0.5em; font-weight:100;
                 text-shadow:0 0 60px rgba(232,212,138,0.2), 0 0 120px rgba(232,212,138,0.08); }
#loading .sub  { color:#444; font-size:0.55rem; letter-spacing:0.5em; }
#load-bar-wrap { width:200px; height:1px; background:#1c1c1c; }
#load-bar      { height:1px; background:#e8d48a; width:0%; transition:width 0.5s ease; }
#load-msg      { color:#2a2a2a; font-size:0.55rem; letter-spacing:0.2em; }

/* TITLE SCREEN */
#title-screen {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1.8rem; z-index:150; opacity:0; transition:opacity 0.8s ease;
  pointer-events:none;
}
#title-screen.show { opacity:1; pointer-events:all; }
#title-screen h1 {
  color:#e8d48a; font-size:clamp(3.5rem,14vw,9rem);
  letter-spacing:0.55em; font-weight:100;
  text-shadow:0 0 80px rgba(232,212,138,0.3);
  animation: titlePulse 3s ease-in-out infinite;
}
@keyframes titlePulse {
  0%,100% { text-shadow:0 0 80px rgba(232,212,138,0.3); }
  50%      { text-shadow:0 0 120px rgba(232,212,138,0.5), 0 0 200px rgba(232,212,138,0.15); }
}
#title-screen .byline { color:#555; font-size:0.55rem; letter-spacing:0.6em; }
#title-screen .location { color:#333; font-size:0.5rem; letter-spacing:0.4em; margin-top:-0.8rem; }
#start-btn {
  margin-top:1rem;
  background:none; border:1px solid rgba(232,212,138,0.3);
  color:#e8d48a; font-family:'Courier New',monospace;
  font-size:0.65rem; letter-spacing:0.5em; padding:0.9rem 2.5rem;
  cursor:pointer; transition:all 0.2s;
  text-transform:uppercase;
}
#start-btn:hover { background:rgba(232,212,138,0.07); border-color:rgba(232,212,138,0.6); }

/* HUD */
#hud { position:fixed; inset:0; pointer-events:none; z-index:10; }

#speedometer {
  position:absolute; bottom:2.5rem; right:2.2rem;
  text-align:right;
}
#speed-val {
  color:#e8d48a; font-size:clamp(2.5rem,8vw,4.5rem);
  font-weight:100; letter-spacing:0.05em; line-height:1;
  text-shadow:0 0 30px rgba(232,212,138,0.4);
}
#speed-unit { color:#555; font-size:0.5rem; letter-spacing:0.4em; margin-top:0.2rem; }

#gear-display {
  position:absolute; bottom:2.5rem; right:2.2rem;
  color:rgba(232,212,138,0.25); font-size:0.5rem; letter-spacing:0.3em;
  bottom:calc(2.5rem + 5rem);
}

#lap-info {
  position:absolute; top:1.5rem; left:50%; transform:translateX(-50%);
  text-align:center;
}
#lap-time { color:#e8d48a; font-size:1.4rem; letter-spacing:0.3em; font-weight:100; }
#lap-label { color:#333; font-size:0.45rem; letter-spacing:0.5em; margin-top:0.2rem; }
#lap-count { color:#555; font-size:0.55rem; letter-spacing:0.3em; margin-top:0.3rem; }

#brand-hud {
  position:absolute; top:1.5rem; left:1.8rem;
  color:rgba(232,212,138,0.2); font-size:0.5rem; letter-spacing:0.5em;
}
#kl-coords {
  position:absolute; bottom:1.8rem; left:1.8rem;
  color:rgba(232,212,138,0.18); font-size:0.48rem; letter-spacing:0.15em;
}
#time-hud {
  position:absolute; top:1.5rem; right:1.8rem;
  color:rgba(232,212,138,0.2); font-size:0.48rem; letter-spacing:0.2em;
}

/* GEAR STRIP */
#gear-strip {
  position:absolute; bottom:2.5rem; left:50%; transform:translateX(-50%);
  display:flex; gap:0.6rem; align-items:center;
}
.gear-pip {
  width:6px; height:6px; border-radius:50%;
  background:rgba(232,212,138,0.1); border:1px solid rgba(232,212,138,0.15);
  transition:all 0.15s;
}
.gear-pip.active { background:#e8d48a; box-shadow:0 0 8px rgba(232,212,138,0.6); }

/* NITRO BAR */
#nitro-wrap {
  position:absolute; bottom:2.5rem; left:1.8rem;
  display:flex; flex-direction:column; gap:0.3rem;
}
#nitro-label { color:#334; font-size:0.42rem; letter-spacing:0.4em; }
#nitro-track { width:80px; height:2px; background:#1a1a22; }
#nitro-bar   { height:2px; background:#44aaff; width:100%; transition:width 0.1s; box-shadow:0 0 6px rgba(68,170,255,0.5); }

/* COUNTDOWN */
#countdown {
  position:fixed; top:40%; left:50%; transform:translate(-50%,-50%);
  color:#e8d48a; font-size:clamp(4rem,20vw,12rem); font-weight:100;
  letter-spacing:0.2em; z-index:100; opacity:0;
  text-shadow:0 0 60px rgba(232,212,138,0.5);
  transition:opacity 0.2s;
  pointer-events:none;
}
#countdown.show { opacity:1; }

/* FLASH OVERLAY */
#flash {
  position:fixed; inset:0; background:rgba(0,0,0,0);
  pointer-events:none; z-index:80; transition:background 0.15s;
}
#flash.white { background:rgba(255,255,255,0.08); }
#flash.red   { background:rgba(120,10,10,0.25); }
#flash.blue  { background:rgba(10,60,120,0.2); }

/* VIGNETTE */
#vignette {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  pointer-events:none; z-index:5;
}

/* CINEMATIC BARS */
#bar-top, #bar-bot {
  position:fixed; left:0; right:0; height:0;
  background:#000; z-index:90; transition:height 0.8s ease;
}
#bar-top { top:0; }
#bar-bot { bottom:0; }

/* MOBILE CONTROLS */
#mobile-controls {
  position:fixed; bottom:3rem; left:0; right:0;
  display:flex; justify-content:space-between; align-items:flex-end;
  padding:0 1.5rem; z-index:20; pointer-events:none;
}
#steer-left, #steer-right {
  pointer-events:all;
  width:70px; height:70px;
  background:rgba(232,212,138,0.06); border:1px solid rgba(232,212,138,0.12);
  border-radius:8px; color:rgba(232,212,138,0.5); font-size:1.5rem;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none;
  touch-action:manipulation;
}
#steer-left:active, #steer-left.pressed,
#steer-right:active, #steer-right.pressed {
  background:rgba(232,212,138,0.15); border-color:rgba(232,212,138,0.35);
}
#throttle-brake {
  pointer-events:all;
  display:flex; flex-direction:column; gap:8px;
}
#btn-gas, #btn-brake, #btn-nitro {
  width:70px; height:55px;
  border-radius:8px; font-family:'Courier New',monospace;
  font-size:0.5rem; letter-spacing:0.2em;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
  user-select:none; touch-action:manipulation; border:none;
}
#btn-gas   { background:rgba(232,212,138,0.12); color:#e8d48a; border:1px solid rgba(232,212,138,0.25); }
#btn-brake { background:rgba(180,40,40,0.12);   color:#cc5555; border:1px solid rgba(180,40,40,0.25); }
#btn-nitro { background:rgba(40,100,220,0.12);  color:#4488ff; border:1px solid rgba(40,100,220,0.25); }
#btn-gas:active, #btn-gas.pressed     { background:rgba(232,212,138,0.25); }
#btn-brake:active, #btn-brake.pressed { background:rgba(180,40,40,0.25); }
#btn-nitro:active, #btn-nitro.pressed { background:rgba(40,100,220,0.25); }

/* MESSAGE */
#msg {
  position:fixed; top:28%; left:50%; transform:translateX(-50%);
  color:rgba(0,0,0,0); font-size:0.7rem; letter-spacing:0.5em;
  z-index:95; pointer-events:none; transition:color 0.5s;
  text-align:center; white-space:nowrap;
}
#msg.show { color:rgba(232,212,138,0.85); }

/* FINISH */
#finish-screen {
  position:fixed; inset:0; background:rgba(0,0,0,0.92);
  display:none; flex-direction:column; align-items:center; justify-content:center;
  gap:1.5rem; z-index:160;
}
#finish-screen.show { display:flex; }
#finish-screen h2 { color:#e8d48a; font-size:clamp(2rem,8vw,5rem); letter-spacing:0.4em; font-weight:100; }
#finish-time { color:#888; font-size:1.2rem; letter-spacing:0.3em; }
#finish-best { color:#555; font-size:0.6rem; letter-spacing:0.4em; }
#restart-btn {
  margin-top:0.5rem; background:none; border:1px solid rgba(232,212,138,0.3);
  color:#e8d48a; font-family:'Courier New',monospace;
  font-size:0.6rem; letter-spacing:0.45em; padding:0.8rem 2rem;
  cursor:pointer; transition:all 0.2s; text-transform:uppercase;
}
#restart-btn:hover { background:rgba(232,212,138,0.08); }
</style>
</head>

  <div class="pre">F12 Productions</div>

<div id="title-screen">
  <div class="pre">F12 PRODUCTIONS PRESENTS</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){

// ─── RENDERER ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060609);
scene.fog = new THREE.FogExp2(0x060609, 0.008);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 800);

const clock = new THREE.Clock();

// ─── LOAD UI ──────────────────────────────────────────────────
const loadBar = document.getElementById('load-bar');
const loadMsg  = document.getElementById('load-msg');
function setLoad(p,m){ loadBar.style.width=p+'%'; if(m) loadMsg.textContent=m; }

// ─── LIGHTS ───────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a1a2e, 1.2));
const moon = new THREE.DirectionalLight(0x6677aa, 0.4);
moon.position.set(100,200,-100); moon.castShadow=true;
scene.add(moon);
const cityHaze = new THREE.HemisphereLight(0x2a1a08, 0x04040a, 0.5);
scene.add(cityHaze);

// ─── MATERIALS ────────────────────────────────────────────────
const M = {
  road:    new THREE.MeshStandardMaterial({color:0x111116, roughness:0.85, metalness:0.1}),
  roadWet: new THREE.MeshStandardMaterial({color:0x0c0c12, roughness:0.05, metalness:0.8}),
  curb:    new THREE.MeshLambertMaterial({color:0x222228}),
  wall:    new THREE.MeshLambertMaterial({color:0x141418}),
  wall2:   new THREE.MeshLambertMaterial({color:0x181420}),
  wall3:   new THREE.MeshLambertMaterial({color:0x1c1810}),
  barrier: new THREE.MeshLambertMaterial({color:0x2a2020}),
  pole:    new THREE.MeshLambertMaterial({color:0x222228}),
  lamp:    new THREE.MeshStandardMaterial({color:0xffe8a0,emissive:0xffcc60,emissiveIntensity:2.0}),
  neon_r:  new THREE.MeshStandardMaterial({color:0xff2222,emissive:0xff1111,emissiveIntensity:2.5}),
  neon_g:  new THREE.MeshStandardMaterial({color:0x00ff88,emissive:0x00ee66,emissiveIntensity:2.2}),
  neon_b:  new THREE.MeshStandardMaterial({color:0x2299ff,emissive:0x1188ff,emissiveIntensity:2.2}),
  neon_y:  new THREE.MeshStandardMaterial({color:0xffcc00,emissive:0xffaa00,emissiveIntensity:2.0}),
  neon_pk: new THREE.MeshStandardMaterial({color:0xff44cc,emissive:0xff22bb,emissiveIntensity:2.5}),
  car_body:new THREE.MeshStandardMaterial({color:0x0a0f1a, roughness:0.15, metalness:0.9}),
  car_glass:new THREE.MeshStandardMaterial({color:0x223344,transparent:true,opacity:0.5,roughness:0.05,metalness:0.2}),
  car_light:new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:3}),
  car_tail: new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:2}),
  car_rim:  new THREE.MeshStandardMaterial({color:0x888898,roughness:0.3,metalness:1.0}),
  distant:  new THREE.MeshLambertMaterial({color:0x0a0a10}),
  grass:    new THREE.MeshLambertMaterial({color:0x0a100a}),
  wire:     new THREE.LineBasicMaterial({color:0x1a1a22}),
  line:     new THREE.MeshLambertMaterial({color:0x444450}),
  lineFade: new THREE.MeshLambertMaterial({color:0x2a2a34}),
};

const world = new THREE.Group();
scene.add(world);

function box(w,h,d,mat,x,y,z,ry){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z); if(ry)m.rotation.y=ry;
  m.receiveShadow=true; m.castShadow=true; world.add(m); return m;
}
function cyl(rt,rb,h,mat,x,y,z,s){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s||8),mat);
  m.position.set(x,y,z); m.castShadow=true; world.add(m); return m;
}

// ─── TRACK DEFINITION ─────────────────────────────────────────
// Oval circuit with chicane — KL street feel
// Track is 12m wide, defined by centerline waypoints
const TRACK_W = 12;
const HALF_W  = TRACK_W/2;

// Waypoints: {x,z} — centerline of track
const waypoints = [
  {x:  0,  z:  0},
  {x: 80,  z:  0},
  {x:140,  z: 30},
  {x:170,  z: 80},
  {x:170,  z:160},
  {x:140,  z:210},
  {x: 80,  z:240},
  {x:  0,  z:240},
  {x:-60,  z:210},
  {x:-80,  z:160},
  {x:-60,  z: 80},
  {x: -20, z: 40},  // chicane
  {x:  20, z: 20},  // chicane exit
  {x:  0,  z:  0},  // close loop
];

// Convert to Vector3 array (flat on y=0)
const trackPts = waypoints.map(w=>new THREE.Vector3(w.x,0,w.z));
const trackCurve = new THREE.CatmullRomCurve3(trackPts, true);
const TRACK_SEGS = 120;
const trackPoints = trackCurve.getPoints(TRACK_SEGS);

setLoad(10,'membina trek...');

// ─── ROAD SURFACE ─────────────────────────────────────────────
// Build road as a ribbon of boxes following the curve
for(let i=0;i<TRACK_SEGS;i++){
  const p0=trackPoints[i];
  const p1=trackPoints[(i+1)%TRACK_SEGS];
  const mid=new THREE.Vector3().addVectors(p0,p1).multiplyScalar(0.5);
  const dir=new THREE.Vector3().subVectors(p1,p0);
  const len=dir.length();
  const angle=Math.atan2(dir.x,dir.z);

  // Main road
  const seg=new THREE.Mesh(new THREE.BoxGeometry(TRACK_W,0.12,len+0.2), M.road);
  seg.position.set(mid.x,-0.06,mid.z);
  seg.rotation.y=angle;
  seg.receiveShadow=true;
  world.add(seg);

  // Wet reflection strip (centre)
  const wet=new THREE.Mesh(new THREE.BoxGeometry(2,0.001,len+0.2), M.roadWet);
  wet.position.set(mid.x,0.001,mid.z);
  wet.rotation.y=angle;
  world.add(wet);

  // Road markings — dashes
  if(i%3===0){
    const dash=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.005,1.8), M.line);
    dash.position.set(mid.x,0.002,mid.z);
    dash.rotation.y=angle;
    world.add(dash);
  }

  // Curbs (alternating red/white style — just geometry)
  const curbL=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.12,len+0.2), i%2===0?M.curb:M.barrier);
  curbL.position.set(mid.x,-0.06,mid.z);
  curbL.rotation.y=angle;
  const offL=new THREE.Vector3(-Math.cos(angle)*(HALF_W+0.4),0,Math.sin(angle)*(HALF_W+0.4));
  // Actually offset perpendicular
  const perpX=Math.cos(angle), perpZ=-Math.sin(angle);
  curbL.position.x+=perpX*(HALF_W+0.4);
  curbL.position.z+=perpZ*(HALF_W+0.4);
  world.add(curbL);

  const curbR=curbL.clone();
  curbR.position.x-=perpX*(TRACK_W+0.8);
  curbR.position.z-=perpZ*(TRACK_W+0.8);
  world.add(curbR);

  // Crash barriers
  const barL=new THREE.Mesh(new THREE.BoxGeometry(0.4,1.0,len+0.2), M.barrier);
  barL.position.set(curbL.position.x+perpX*1.2, 0.4, curbL.position.z+perpZ*1.2);
  barL.rotation.y=angle;
  world.add(barL);

  const barR=barL.clone();
  barR.position.x-=perpX*(TRACK_W+2.8);
  barR.position.z-=perpZ*(TRACK_W+2.8);
  world.add(barR);
}

setLoad(25,'membina bandar...');

// ─── KL STREET ENVIRONMENT ────────────────────────────────────
// Ground fill outside track
box(600,0.1,600, M.grass, 85,  -0.1, 120);

// Shophouse blocks around the circuit
const buildingConfigs=[
  {x:0,   z:-30, l:160, side:'top'},
  {x:0,   z:270, l:160, side:'bot'},
  {x:-120,z:120, l:150, side:'left'},
  {x:210, z:120, l:150, side:'right'},
];
const bMats=[M.wall,M.wall2,M.wall3];
buildingConfigs.forEach(({x,z,l,side})=>{
  const num=Math.floor(l/22);
  for(let i=0;i<num;i++){
    const h=6+Math.random()*8;
    let bx=x,bz=z;
    if(side==='top'||side==='bot')   bx = x - l/2 + i*22 + 11;
    if(side==='left'||side==='right') bz = z - l/2 + i*22 + 11;
    const mat=bMats[i%3];
    box(20,h,8,mat,bx,h/2,bz);
    box(20.4,0.4,8.4,M.curb,bx,h+0.2,bz);
    // Upper windows
    for(let w=0;w<3;w++){
      const wy=2+w*2;
      box(3,1.5,0.1,M.car_glass,bx+(w-1)*5,wy,bz-4.06);
    }
    // Neon sign on building
    if(Math.random()>0.45){
      const nm=[M.neon_r,M.neon_g,M.neon_b,M.neon_y,M.neon_pk];
      const nmat=nm[Math.floor(Math.random()*nm.length)];
      box(4,0.7,0.12,nmat,bx+(Math.random()-0.5)*8,h-1.5,bz-4.1);
      const ng=new THREE.PointLight(nmat.emissive,0.5,12,2);

// ─── AUDIO ────────────────────────────────────────────────────
let audioCtx=null,masterGain=null,engineOsc=null,engineGain=null,audioOn=false;

function initAudio(){
  if(audioOn) return; audioOn=true;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain(); masterGain.gain.value=0.4;
    masterGain.connect(audioCtx.destination);

    // Engine sound
    const eg=audioCtx.createGain(); eg.gain.value=0.0;
    const eo=audioCtx.createOscillator(); eo.type='sawtooth'; eo.frequency.value=60;
    const ef=audioCtx.createBiquadFilter(); ef.type='lowpass'; ef.frequency.value=400;
    const eo2=audioCtx.createOscillator(); eo2.type='square'; eo2.frequency.value=120;
    const eg2=audioCtx.createGain(); eg2.gain.value=0.3;
    eo.connect(ef); ef.connect(eg);
    eo2.connect(eg2); eg2.connect(eg);
    eg.connect(masterGain);
    eo.start(); eo2.start();
    engineOsc=eo; engineGain=eg;

    // City ambience
    const abuf=audioCtx.createBuffer(1,audioCtx.sampleRate*3,audioCtx.sampleRate);
    const ad=abuf.getChannelData(0);
    for(let i=0;i<ad.length;i++) ad[i]=(Math.random()*2-1);
    const as=audioCtx.createBufferSource(); as.buffer=abuf; as.loop=true;
    const af=audioCtx.createBiquadFilter(); af.type='bandpass'; af.frequency.value=600; af.Q.value=0.3;
    const ag=audioCtx.createGain(); ag.gain.value=0.015;
    as.connect(af); af.connect(ag); ag.connect(masterGain); as.start();

  }catch(e){console.warn('audio fail',e);}
}

function updateEngineSound(speed,rpm){
  if(!engineOsc||!engineGain) return;
  const freq=55+rpm*180;
  engineOsc.frequency.setTargetAtTime(freq,audioCtx.currentTime,0.05);
  const vol=speed>0.5?0.18:0.05;
  engineGain.gain.setTargetAtTime(vol,audioCtx.currentTime,0.08);
}

function playNitroSound(){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
  o.type='sawtooth'; o.frequency.value=800;
  o.frequency.exponentialRampToValueAtTime(200,audioCtx.currentTime+0.3);
  g.gain.setValueAtTime(0.12,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.35);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.4);
}

function playCollisionSound(){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
  o.type='square'; o.frequency.value=120;
  g.gain.setValueAtTime(0.2,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
  o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.35);
}

// ─── PARTICLE UPDATE ──────────────────────────────────────────
function updateParticles(dt,drifting,speed){
  // Sparks — drift sparks
  const spArr=state.sparks;
  if(drifting&&speed>8){
    for(let i=0;i<3;i++){
      const s=spArr.find(s=>s.life<=0);
      if(s){
        s.x=state.carPos.x+(Math.random()-0.5)*2;
        s.y=0.3; s.z=state.carPos.z+(Math.random()-0.5)*2;
        s.vx=(Math.random()-0.5)*4; s.vy=Math.random()*2+1; s.vz=(Math.random()-0.5)*4;
        s.life=0.4+Math.random()*0.3;
      }
    }
  }
  spArr.forEach(s=>{ if(s.life>0){ s.life-=dt; s.x+=s.vx*dt; s.y+=s.vy*dt-3*dt*dt; s.z+=s.vz*dt; }});
  for(let i=0;i<SPARK_COUNT;i++){
    const s=spArr[i];
    sparkPos[i*3]=s.life>0?s.x:9999;
    sparkPos[i*3+1]=s.y; sparkPos[i*3+2]=s.z;
  }
  sparkGeo.attributes.position.needsUpdate=true;

  // Smoke — exhaust
  const smArr=state.smokeParticles;
  if(keys.gas||state.carSpeed>2){
    const sm=smArr.find(s=>s.life<=0);
    if(sm){
      const back=new THREE.Vector3(Math.sin(state.carAngle)*1.8,0.3,Math.cos(state.carAngle)*1.8);
      sm.x=state.carPos.x+back.x; sm.y=back.y; sm.z=state.carPos.z+back.z;
      sm.life=0.8; sm.maxLife=0.8;
    }
  }
  smArr.forEach(s=>{ if(s.life>0){s.life-=dt; s.y+=0.5*dt; s.x+=(Math.random()-0.5)*0.5*dt; s.z+=(Math.random()-0.5)*0.5*dt;}});
  for(let i=0;i<SMOKE_COUNT;i++){
    const s=smArr[i];
    smokePos[i*3]=s.life>0?s.x:9999;
    smokePos[i*3+1]=s.y; smokePos[i*3+2]=s.z;
  }
  smokeGeo.attributes.position.needsUpdate=true;
}

// ─── TRACK PROGRESS ───────────────────────────────────────────
function nearestProgress(pos){
  let best=state.trackProgress, bestDist=9999;
  const search=0.05;
  for(let t=state.trackProgress-search;t<state.trackProgress+search;t+=0.002){
    const p=trackCurve.getPoint(((t%1)+1)%1);
    const d=pos.distanceTo(p);
    if(d<bestDist){bestDist=d;best=((t%1)+1)%1;}
  }
  return best;
}

// ─── AI ───────────────────────────────────────────────────────
function updateAI(dt){
  const aiTargetSpeed=16+Math.sin(state.aiProgress*Math.PI*4)*4;
  if(state.aiSpeed<aiTargetSpeed) state.aiSpeed+=6*dt;
  else state.aiSpeed-=3*dt;
  state.aiSpeed=Math.max(0,Math.min(22,state.aiSpeed));
  state.aiProgress=(state.aiProgress+state.aiSpeed/(trackCurve.getLength())*dt)%1;
  const aiPt=trackCurve.getPoint(state.aiProgress);
  const aiPt2=trackCurve.getPoint((state.aiProgress+0.01)%1);
  state.aiPos.set(aiPt.x,0.32,aiPt.z);
  state.aiAngle=Math.atan2(aiPt2.x-aiPt.x,aiPt2.z-aiPt.z);
  aiGroup.position.copy(state.aiPos);
  aiGroup.rotation.y=state.aiAngle;
  // Wheel spin
  aiGroup.children.filter((_,i)=>i>6&&i<11).forEach(w=>{ w.rotation.x-=state.aiSpeed*dt*2; });
}

// ─── CAR PHYSICS ──────────────────────────────────────────────
const MAX_SPEED=70; // km/h = ~19.4 m/s
const MAX_MS=MAX_SPEED/3.6;
const NITRO_SPEED=95/3.6;

function updateCar(dt){
  if(state.phase!=='racing') return;

  const nitroActive=keys.nitro&&state.nitroLevel>0;
  const topSpeed=nitroActive?NITRO_SPEED:MAX_MS;

  // Throttle / brake
  if(keys.gas){
    const acc=nitroActive?28:12;
    state.carSpeed=Math.min(topSpeed, state.carSpeed+acc*dt);
  } else {
    state.carSpeed=Math.max(0, state.carSpeed-6*dt);
  }
  if(keys.brake){
    state.carSpeed=Math.max(0, state.carSpeed-18*dt);
    if(state.carSpeed<1) state.carSpeed=0;
  }

  // Nitro drain
  if(nitroActive){
    state.nitroLevel=Math.max(0,state.nitroLevel-dt*0.35);
  } else {
    state.nitroLevel=Math.min(1,state.nitroLevel+dt*0.08);
  }

  // Steering
  const steerPower=Math.min(1,state.carSpeed/8);
  const steerRate=1.8*steerPower;
  if(keys.left)  state.steer=Math.max(-1,state.steer-steerRate*dt*4);
  else if(keys.right) state.steer=Math.min(1,state.steer+steerRate*dt*4);
  else state.steer*=0.85;

  // Drift
  const driftFactor=Math.abs(state.steer)*state.carSpeed*0.02;
  state.drift=state.drift*0.9+state.steer*driftFactor*0.1;

  // Angle
  const turnAmount=state.steer*(state.carSpeed/MAX_MS)*dt*1.6;
  state.carAngle+=turnAmount;

  // Move
  const fwd=new THREE.Vector3(Math.sin(state.carAngle+state.drift),0,Math.cos(state.carAngle+state.drift));
  state.carPos.addScaledVector(fwd,state.carSpeed*dt);
  state.carPos.y=0.32;

  // Keep on track (magnetic pull)
  const prog=nearestProgress(state.carPos);
  const onTrack=trackCurve.getPoint(prog);
  const dist2D=Math.sqrt((state.carPos.x-onTrack.x)**2+(state.carPos.z-onTrack.z)**2);
  if(dist2D>HALF_W){
    // Off track — push back
    const pull=new THREE.Vector3(onTrack.x-state.carPos.x,0,onTrack.z-state.carPos.z).normalize();
    state.carPos.addScaledVector(pull,0.3);
    state.carSpeed*=0.88;
    playCollisionSound();
    flashScreen('red',250);
  }

  // Track progress & lap detection
  const prevProg=state.trackProgress;
  state.trackProgress=prog;
  // Lap: crossed start (progress wraps 0.99 -> 0.01)
  if(prevProg>0.92&&state.trackProgress<0.08){
    state.lap++;
    if(state.lap<=state.totalLaps){
      if(!state.bestLap||state.lapTime<state.bestLap) state.bestLap=state.lapTime;
      showMsg(`PUSINGAN ${state.lap-1} — ${formatTime(state.lapTime)}`);
      flashScreen('white',300);
      state.lapTime=0;
    } else {
      finishRace();
    }
  }

  // Gear
  const speedKMH=state.carSpeed*3.6;
  state.gear=calcGear(speedKMH);

  // Apply to car mesh
  carGroup.position.copy(state.carPos);
  carGroup.rotation.y=state.carAngle+state.drift*0.4;

  // Wheel spin & steer visual
  const spinRate=state.carSpeed*dt*1.8;
  wheels.forEach(w=>w.rotation.x-=spinRate);
  // Front wheels steer
  [wheels[0],wheels[1]].forEach(w=>w.rotation.y=state.steer*0.35);

  updateParticles(dt,Math.abs(state.drift)>0.04||Math.abs(state.steer)>0.6,state.carSpeed);
  updateEngineSound(state.carSpeed,state.carSpeed/MAX_MS);

  if(nitroActive&&Math.random()<0.3) flashScreen('blue',80);
}

// ─── CAMERA ───────────────────────────────────────────────────
let camYaw=0;
const camTarget=new THREE.Vector3();
const camPos=new THREE.Vector3();

function updateCamera(dt){
  const cp=carGroup.position;
  const ca=state.carAngle;

  if(state.cameraMode===0){
    // Chase cam — behind and above
    const offset=new THREE.Vector3(Math.sin(ca)*-7,3.5,Math.cos(ca)*-7);
    camTarget.lerp(cp.clone().add(new THREE.Vector3(Math.sin(ca)*3,0.5,Math.cos(ca)*3)),0.08);
    camPos.lerp(cp.clone().add(offset),0.08);
  } else if(state.cameraMode===1){
    // Hood cam
    const hoodOff=new THREE.Vector3(Math.sin(ca)*2.2,1.1,Math.cos(ca)*2.2);
    camPos.lerp(cp.clone().add(hoodOff),0.2);
    camTarget.lerp(cp.clone().add(new THREE.Vector3(Math.sin(ca)*15,0.8,Math.cos(ca)*15)),0.15);
  } else {
    // Cinematic — wide low angle from side
    const sideOff=new THREE.Vector3(Math.cos(ca)*10,2,Math.sin(ca)*-10);
    camPos.lerp(cp.clone().add(sideOff),0.04);
    camTarget.lerp(cp.clone().addScaledVector(new THREE.Vector3(Math.sin(ca),0,Math.cos(ca)),8),0.06);
  }

  camera.position.copy(camPos);
  camera.lookAt(camTarget);
}

// ─── COUNTDOWN ────────────────────────────────────────────────
function startCountdown(){
  state.phase='countdown';
  state.countdownVal=3;
  let n=3;
  const tick=()=>{
    if(n>0){
      countdownEl.textContent=n;
      countdownEl.classList.add('show');
      setTimeout(()=>countdownEl.classList.remove('show'),700);
      n--; setTimeout(tick,1000);
    } else {
      countdownEl.textContent='GAS!';
      countdownEl.classList.add('show');
      setTimeout(()=>{ countdownEl.classList.remove('show'); state.phase='racing'; },900);
    }
  };
  setTimeout(tick,600);
}

// ─── FINISH ───────────────────────────────────────────────────
function finishRace(){
  state.phase='finished';
  const ft=document.getElementById('finish-time');
  const fb=document.getElementById('finish-best');
  ft.textContent=formatTime(state.lapTime);
  fb.textContent=state.bestLap?`TERBAIK: ${formatTime(state.bestLap)}`:'';
  finishScreen.classList.add('show');
}

function restartRace(){
  state.phase='countdown';
  state.lap=1; state.lapTime=0;
  state.carSpeed=0; state.carAngle=0; state.steer=0; state.drift=0;
  state.trackProgress=0; state.nitroLevel=1;
  state.carPos.copy(trackPoints[0]); state.carPos.y=0.32;
  carGroup.position.copy(state.carPos);
  state.aiProgress=0.04;
  finishScreen.classList.remove('show');
  startCountdown();
}

document.getElementById('start-btn').addEventListener('click',()=>{
  initAudio();
  document.getElementById('title-screen').style.opacity='0';
  document.getElementById('title-screen').style.pointerEvents='none';
  setTimeout(()=>{ document.getElementById('title-screen').style.display='none'; startCountdown(); },800);
});
document.getElementById('restart-btn').addEventListener('click',restartRace);

// ─── LAMP FLICKER ─────────────────────────────────────────────
function updateLamps(elapsed){
  lampLights.forEach(l=>{
    l.light.intensity=l.base*(0.92+0.08*Math.sin(elapsed*l.phase));
  });
}

// ─── MAIN LOOP ────────────────────────────────────────────────
setLoad(92,'hampir siap...');

let prevTs=0;
function animate(ts){
  requestAnimationFrame(animate);
  const dt=Math.min((ts-prevTs)/1000,0.05);
  prevTs=ts;
  const elapsed=clock.getElapsedTime();

  if(state.phase==='racing'){
    state.lapTime+=dt;
    updateCar(dt);
    updateAI(dt);
  } else if(state.phase==='countdown'||state.phase==='title'){
    updateAI(dt);
  }

  updateCamera(dt);
  updateLamps(elapsed);

  // HUD
  const kmh=Math.floor(state.carSpeed*3.6);
  speedEl.textContent=kmh;
  lapTimeEl.textContent=formatTime(state.lapTime);
  lapCountEl.textContent=`PUSINGAN ${Math.min(state.lap,state.totalLaps)} / ${state.totalLaps}`;
  nitroBarEl.style.width=(state.nitroLevel*100)+'%';
  gearPips.forEach((p,i)=>p.classList.toggle('active',i<state.gear));

  // Nitro blue tint on speedometer
  speedEl.style.color=keys.nitro&&state.nitroLevel>0?'#88ccff':'#e8d48a';
  speedEl.style.textShadow=keys.nitro&&state.nitroLevel>0?'0 0 30px rgba(100,180,255,0.6)':'0 0 30px rgba(232,212,138,0.4)';

  // KLCC blink
  klccTop.intensity=Math.sin(elapsed*2)>0.95?0.7:0;

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─── LAUNCH ───────────────────────────────────────────────────
setLoad(100,'selamat datang ke MIDNITE');
camPos.set(85,25,120); camTarget.set(85,0,120);
camera.position.copy(camPos); camera.lookAt(camTarget);

setTimeout(()=>{
  const lo=document.getElementById('loading');
  lo.style.opacity='0';
  setTimeout(()=>{
    lo.style.display='none';
    document.getElementById('title-screen').classList.add('show');
  },1200);
  requestAnimationFrame(animate);
},1600);

})();
</script>
